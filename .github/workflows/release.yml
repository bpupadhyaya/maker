name: release

# Build native installers for macOS / Windows / Linux from ONE codebase and
# upload them to this repo's GitHub Releases (the decided primary distribution
# channel — see docs/DESIGN.md → Distribution).
#
# Phase A (now): UNSIGNED but real artifacts (.dmg / .msi / .AppImage / .deb).
# Users get an OS "unidentified developer" prompt they click through.
# Phase B (later): add signing secrets (see the `env:` block) → no warnings.
#
# Trigger: push a tag like `v0.1.0`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # create the GitHub Release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            triple: "" # tauri-action picks universal via args below
          - os: ubuntu-latest
            triple: ""
          - os: windows-latest
            triple: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Release gate — the test suite + offline build must pass on THIS OS first.
      - name: Release gate (tests)
        run: node --test "packages/**/test/**/*.test.ts"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Bun (to compile the self-contained server sidecar)
        uses: oven-sh/setup-bun@v2

      - name: Linux build deps (webkit2gtk, etc.)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf build-essential libssl-dev file

      - name: Build the server sidecar (no system Node needed in the app)
        run: node scripts/build-sidecar.mjs

      - name: Generate app icons from the source PNG
        run: npx --yes @tauri-apps/cli@2 icon packages/gui/src-tauri/icon-source.png --output packages/gui/src-tauri/icons

      # Phase A = UNSIGNED. We deliberately pass NO signing env so Tauri ad-hoc
      # signs on macOS and skips signing on Windows (empty cert secrets made
      # `security import` fail). Phase B re-adds the signing env block below:
      #   env:
      #     APPLE_CERTIFICATE / _PASSWORD / APPLE_SIGNING_IDENTITY / APPLE_ID /
      #     APPLE_PASSWORD / APPLE_TEAM_ID  (macOS Developer ID + notarization)
      #     WINDOWS_CERTIFICATE / _PASSWORD  (Authenticode or Azure Trusted Signing)
      #     TAURI_SIGNING_PRIVATE_KEY / _PASSWORD  (updater, Phase C)
      - name: Build + upload installers to the GitHub Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # required to create/upload the release
        with:
          projectPath: packages/gui
          tagName: ${{ github.ref_name }}
          releaseName: "Maker ${{ github.ref_name }}"
          releaseBody: "Maker — build tools by conversation, on-device and offline. Download the installer for your OS below. First run downloads a local model (the one online step)."
          releaseDraft: true
          prerelease: true
          # Per-arch build (the sidecar is single-arch) — macOS runner = Apple Silicon,
          # so this produces an arm64 .dmg. Universal (arm64+x64) needs a fat sidecar; add later.
