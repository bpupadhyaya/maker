name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # One codebase, verified on all three desktop OSes. Uses Node's native TS
    # support + built-in test runner, so no install step is needed.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run tests (offline; includes the network-off offline gate)
        run: node --test "packages/**/test/**/*.test.ts"
